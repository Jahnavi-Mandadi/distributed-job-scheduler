version: '3.9'

services:

  postgres:

    image: postgres:17

    container_name: workflow_postgres

    environment:
      POSTGRES_DB: workflow_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Jahnavi

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data


  backend:

    build: ./backend

    container_name: workflow_backend

    ports:
      - "5000:5000"

    env_file:
      - ./backend/.env

    depends_on:
      - postgres


  frontend:

    build: ./frontend

    container_name: workflow_frontend

    ports:
      - "3000:3000"

    depends_on:
      - backend


volumes:
  postgres_data: